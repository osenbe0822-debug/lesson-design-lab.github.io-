<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>授業前後セルフチェック | Inquiry Teacher Lab</title>
  <meta name="description" content="授業前の準備と授業後の振り返りをチェックし、強み、確認が必要な項目、次回一つだけ変えるならを整理します。">
  <meta property="og:title" content="授業前後セルフチェック | Inquiry Teacher Lab">
  <meta property="og:description" content="点数を競うのではなく、次に変える一点を見つけるチェックツール。">
  <meta property="og:type" content="website">
  <meta property="og:image" content="assets/hero-inquiry-desk.png">
  <link rel="canonical" href="https://example.com/self-check.html">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="self-check">
  <a class="skip-link" href="#main">本文へ移動</a>
  <header class="site-header"><nav class="nav" aria-label="メインナビゲーション"><a class="brand" href="index.html">Inquiry Teacher Lab <span>探究する先生の授業準備室</span></a><button class="nav-toggle" type="button" aria-expanded="false" aria-label="メニューを開く" data-nav-toggle>☰</button><div class="nav-links" data-nav-links><a href="classroom-english.html">教室英語</a><a href="question-maker.html">問いメーカー</a><a aria-current="page" href="self-check.html">セルフチェック</a><a href="ib-notes.html">IB/PYP</a><a href="about.html">このサイト</a><a href="terms.html">注意事項</a></div></nav></header>
  <main id="main">
    <section class="page-title"><div class="container"><p class="eyebrow">Before / After Lesson Check</p><h1>授業前後セルフチェック</h1><p class="lead">点数を競うためではなく、授業準備や振り返りで「次回一つだけ変えるなら」を見つけるためのツールです。</p></div></section>
    <section class="section">
      <div class="container grid two">
        <div>
          <div class="card">
            <div class="field"><label for="mode">チェックの種類</label><select id="mode" data-check-mode><option value="before">授業前チェック</option><option value="after">授業後チェック</option></select></div>
            <div class="field"><label for="memo">授業前または授業後のメモ</label><textarea id="memo" rows="5" data-check-memo placeholder="例: 3年生 算数 45分。個人情報や校内情報は入力しないでください。"></textarea></div>
          </div>
          <form class="check-form" data-check-form></form>
        </div>
        <aside>
          <div class="callout"><p>「今回の授業では必要ない」は減点対象にしません。結果は参考情報です。学校や子どもの実態に応じて判断してください。</p></div>
          <div id="results" class="grid" data-results aria-live="polite"></div>
          <h2>保存結果</h2>
          <div class="grid" data-saved-results></div>
        </aside>
      </div>
    </section>
  </main>
  <footer class="site-footer"><div class="container"><p class="muted">保存結果はこのブラウザのlocalStorageに保存されます。個人情報は保存しないでください。</p></div></footer>
  <script src="assets/app.js" defer></script>
</body>
</html>
