  <a class="skip-link" href="#main">本文へ移動</a>
  <header class="site-header"><nav class="nav" aria-label="メインナビゲーション"><a class="brand" href="index.html">Inquiry Teacher Lab <span>探究する先生の授業準備室</span></a><button class="nav-toggle" type="button" aria-expanded="false" aria-label="メニューを開く" data-nav-toggle>☰</button><div class="nav-links" data-nav-links><a aria-current="page" href="classroom-english.html">教室英語</a><a href="question-maker.html">問いメーカー</a><a href="self-check.html">セルフチェック</a><a href="ib-notes.html">IB/PYP</a><a href="about.html">このサイト</a><a href="terms.html">注意事項</a></div></nav></header>
  <main id="main">
    <section class="page-title">
      <div class="container">
        <p class="eyebrow">最重要ツール</p>
        <h1>場面別・教室英語検索</h1>
        <p class="lead">キーワード、利用場面、子どもの状態、表現の目的、強さ、対象年齢で絞り込めます。発音補助のカタカナは参考表示であり、正確な発音そのものではありません。</p>
      </div>
    </section>
    <section class="section">
      <div class="container">
        <div class="controls wide">
          <div class="field"><label for="search">キーワード</label><input id="search" type="search" placeholder="例: notice / トラブル / 準備" data-search></div>
          <div class="field"><label for="scene">利用場面</label><select id="scene" data-scene></select></div>
          <div class="field"><label for="state">子どもの状態</label><select id="state" data-state></select></div>
          <div class="field"><label for="purpose">表現の目的</label><select id="purpose" data-purpose></select></div>
          <div class="field"><label for="strength">表現の強さ</label><select id="strength" data-strength></select></div>
          <div class="field"><label for="age">対象年齢</label><select id="age" data-age></select></div>
        </div>
        <div class="toolbar">
          <label><input type="checkbox" data-only-favorites> お気に入りだけ表示</label>
          <button type="button" class="secondary" data-reset-filters>絞り込みをリセット</button>
        </div>
        <div class="grid two" data-expression-list aria-live="polite"></div>
      </div>
    </section>
  </main>
  <footer class="site-footer"><div class="container"><p class="muted">お気に入りはログインなしで、このブラウザのlocalStorageに保存されます。</p></div></footer>
